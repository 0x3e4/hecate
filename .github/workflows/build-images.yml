name: Build and Push Container Images

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build and Push (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./backend
            target: ""
            title: Hecate Backend
            description: FastAPI backend — REST API, scheduler, MCP server, and 9 ingestion pipelines (NVD / EUVD / KEV / CWE / CAPEC / CPE / CIRCL / GHSA / OSV).
          - component: frontend
            context: ./frontend
            target: runtime
            title: Hecate Frontend
            description: React SPA — vulnerability dashboard, DQL query builder, SCA scan management, environment inventory, MCP info, served by nginx.
          - component: scanner
            context: ./scanner
            target: ""
            title: Hecate Scanner
            description: Scanner sidecar — Trivy, Grype, Syft, OSV Scanner, Semgrep, TruffleHog, Dockle, Dive, DevSkim plus the Hecate analyzer (35 supply-chain rules).
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/hecate-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inject the short commit SHA so the running container can
          # report its identity via /api/v1/version. Used by the in-app
          # Support page to detect when a newer `main-<sha>` image has
          # been pushed to GHCR.
          build-args: |
            HECATE_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
