site_name: Hecate
site_description: Vulnerability Management & SCA platform — documentation
docs_dir: docs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  # Dark-only to match the app (gold + grey). Exact colors come from assets/extra.css;
  # black/amber are the closest named fallbacks if the CSS fails to load.
  palette:
    - scheme: slate
      primary: black
      accent: amber
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - guide/overview.md
      - Dashboard: guide/dashboard.md
      - Vulnerabilities: guide/vulnerabilities.md
      - Search & Query Builder: guide/search.md
      - Environment Inventory: guide/inventory.md
      - AI Analysis & Attack Paths: guide/ai-analysis.md
      - Statistics & Changelog: guide/statistics.md
  - SCA Scanning:
      - sca-scanning.md
      - Reading Scan Results: sca/scan-results.md
      - Attack Chain: sca/attack-chain.md
      - Malware Detection & Feed: sca/malware.md
      - License Compliance: sca/licenses.md
  - Integrations:
      - MCP Server: integrations/mcp.md
      - CI/CD: integrations/cicd.md
      - REST API: integrations/api.md
      - Notifications: integrations/notifications.md
  - Administration:
      - System Settings: admin/system.md
      - Security & Access Control: security-access-control.md
      - Audit & Observability: admin/audit.md
  - Reference:
      - Configuration: configuration.md
      - Architecture: architecture.md
  - Changelog: changelog.md
