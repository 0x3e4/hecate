site_name: Hecate
site_description: Vulnerability Management & SCA platform — documentation
docs_dir: docs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  # Dark-only to match the app (gold + grey). Exact colors come from assets/extra.css;
  # black/amber are the closest named fallbacks if the CSS fails to load.
  palette:
    - scheme: slate
      primary: black
      accent: amber
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - SCA Scanning: sca-scanning.md
  - Security & Access Control: security-access-control.md
  - Architecture: architecture.md
  - Changelog: changelog.md
